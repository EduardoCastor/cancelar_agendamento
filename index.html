<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelar Atendimento</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body>
  <div class="bg"></div>
  <div class="container">
    <img src="assets/logo.webp" alt="Logo Prefeitura" class="logo">
    <h1>Prefeitura Municipal de Cabo Frio</h1>
    <h2>Secretaria Municipal de Educação</h2>
    <p>Atendimento Presencial - Cancelar Agendamento</p>
 

  <form id="formCancelamento">
    <input
      type="text"
      id="protocolo"
      placeholder="Digite o número do protocolo"
      inputmode="numeric"
      pattern="[0-9]*"
      required
    />

    <button type="submit">Cancelar</button>
  </form>

   <div id="status" class="hidden">
    ✅ Agendamento Cancelado com sucesso!<br>
  </div>

  <script src="script.js"></script>
</body>
</html>
